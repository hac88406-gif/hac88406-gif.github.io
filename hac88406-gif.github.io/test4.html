<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JavaScript 基础学习 - 年龄计算器</title>
</head>
<body>

    <script>

        let radius = Number(prompt("请输入圆的半径"));

        // 常见的数学公式和常量都定义在Math对象中
        let area = Math.PI * radius * radius;
        area = area.toFixed(2);
        console.log(`圆的面积是: ${area}`);
        document.write(`半径为${radius}的圆的面积是<span style="color:red;font-size:20px;">${area}</span>`);

    </script>

</body>
</html>
