<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>商品结算计算器</title>
</head>
<body>

    <script>

        // 获取输入
        let productName = prompt("请输入商品名称");
        let unitPrice = Number(prompt("请输入商品单价（元）"));
        let quantity = Number(prompt("请输入购买数量"));
        let payment = Number(prompt("请输入付款金额（元）"));
        let isMember = confirm("是否会员？（会员享8.5折优惠）");

        // 计算逻辑
        let originalPrice = unitPrice * quantity;
        let memberDiscount = isMember ? originalPrice * 0.15 : 0;
        let priceAfterMember = originalPrice - memberDiscount;
        let fullDiscount = Math.floor(priceAfterMember / 100) * 10;
        let total = priceAfterMember - fullDiscount;
        let points = Math.floor(total);
        let change = payment - total;

        // 判断付款金额是否足够
        if (change < 0) {
            alert("付款金额不足！还需支付 ¥" + Math.abs(change).toFixed(2));
        } else {
            // 1. 控制台输出
            console.log("========================================");
            console.log("商品结算结果");
            console.log("========================================");
            console.log("商品名称: " + productName);
            console.log("商品单价: ¥" + unitPrice.toFixed(2));
            console.log("购买数量: " + quantity);
            console.log("是否会员: " + (isMember ? "是（8.5折）" : "否"));
            console.log("----------------------------------------");
            console.log("原价金额: ¥" + originalPrice.toFixed(2));
            console.log("会员折扣: -¥" + memberDiscount.toFixed(2));
            console.log("满减优惠: -¥" + fullDiscount.toFixed(2));
            console.log("----------------------------------------");
            console.log("应付金额: ¥" + total.toFixed(2));
            console.log("付款金额: ¥" + payment.toFixed(2));
            console.log("找零金额: ¥" + change.toFixed(2));
            console.log("获得积分: " + points + " 积分");
            console.log("========================================");

            // 2. 弹窗输出
            let alertMsg = "🛒 商品结算结果\n\n";
            alertMsg += "商品名称: " + productName + "\n";
            alertMsg += "商品单价: ¥" + unitPrice.toFixed(2) + "\n";
            alertMsg += "购买数量: " + quantity + "\n";
            alertMsg += "是否会员: " + (isMember ? "是（8.5折）" : "否") + "\n";
            alertMsg += "----------------------------------------\n";
            alertMsg += "原价金额: ¥" + originalPrice.toFixed(2) + "\n";
            alertMsg += "会员折扣: -¥" + memberDiscount.toFixed(2) + "\n";
            alertMsg += "满减优惠: -¥" + fullDiscount.toFixed(2) + "\n";
            alertMsg += "----------------------------------------\n";
            alertMsg += "应付金额: ¥" + total.toFixed(2) + "\n";
            alertMsg += "付款金额: ¥" + payment.toFixed(2) + "\n";
            alertMsg += "找零金额: ¥" + change.toFixed(2) + "\n";
            alertMsg += "获得积分: " + points + " 积分\n\n";
            alertMsg += "🎉 结算成功！";
            window.alert(alertMsg);

            // 3. HTML页面输出
            document.write("<h1 style='text-align:center;color:#007bff;margin-bottom:30px;'>🛒 商品结算结果</h1>");
            document.write("<div style='max-width:500px;margin:0 auto;background:#fff;padding:30px;border-radius:10px;box-shadow:0 2px 15px rgba(0,0,0,0.1);'>");
            
            document.write("<div style='display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid #f0f0f0;'>");
            document.write("<span style='color:#666;'>商品名称</span>");
            document.write("<span style='font-weight:bold;color:#333;'>" + productName + "</span>");
            document.write("</div>");

            document.write("<div style='display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid #f0f0f0;'>");
            document.write("<span style='color:#666;'>商品单价</span>");
            document.write("<span style='font-weight:bold;color:#333;'>¥" + unitPrice.toFixed(2) + "</span>");
            document.write("</div>");

            document.write("<div style='display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid #f0f0f0;'>");
            document.write("<span style='color:#666;'>购买数量</span>");
            document.write("<span style='font-weight:bold;color:#333;'>" + quantity + "</span>");
            document.write("</div>");

            document.write("<div style='display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid #f0f0f0;'>");
            document.write("<span style='color:#666;'>是否会员</span>");
            document.write("<span style='font-weight:bold;color:#333;'>" + (isMember ? "是（8.5折）" : "否") + "</span>");
            document.write("</div>");

            document.write("<div style='display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid #f0f0f0;'>");
            document.write("<span style='color:#666;'>原价金额</span>");
            document.write("<span style='font-weight:bold;color:#333;'>¥" + originalPrice.toFixed(2) + "</span>");
            document.write("</div>");

            document.write("<div style='display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid #f0f0f0;'>");
            document.write("<span style='color:#666;'>会员折扣</span>");
            document.write("<span style='font-weight:bold;color:#dc3545;'>-¥" + memberDiscount.toFixed(2) + "</span>");
            document.write("</div>");

            document.write("<div style='display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid #f0f0f0;'>");
            document.write("<span style='color:#666;'>满减优惠</span>");
            document.write("<span style='font-weight:bold;color:#dc3545;'>-¥" + fullDiscount.toFixed(2) + "</span>");
            document.write("</div>");

            document.write("<div style='display:flex;justify-content:space-between;padding:15px 10px;margin:10px -30px;background:#f8f9fa;'>");
            document.write("<span style='color:#666;font-weight:bold;'>应付金额</span>");
            document.write("<span style='font-weight:bold;color:#007bff;font-size:20px;'>¥" + total.toFixed(2) + "</span>");
            document.write("</div>");

            document.write("<div style='display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid #f0f0f0;'>");
            document.write("<span style='color:#666;'>付款金额</span>");
            document.write("<span style='font-weight:bold;color:#333;'>¥" + payment.toFixed(2) + "</span>");
            document.write("</div>");

            document.write("<div style='display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid #f0f0f0;'>");
            document.write("<span style='color:#666;'>找零金额</span>");
            document.write("<span style='font-weight:bold;color:#fd7e14;'>¥" + change.toFixed(2) + "</span>");
            document.write("</div>");

            document.write("<div style='display:flex;justify-content:space-between;padding:10px 0;'>");
            document.write("<span style='color:#666;'>获得积分</span>");
            document.write("<span style='font-weight:bold;color:#28a745;'>🏆 " + points + " 积分</span>");
            document.write("</div>");

            document.write("<div style='background:#d4edda;color:#155724;padding:15px;border-radius:8px;margin-top:20px;font-weight:bold;text-align:center;'>");
            document.write("🎉 结算成功！购买「" + productName + "」" + quantity + "件，共获得 " + points + " 积分");
            document.write("</div>");

            document.write("</div>");
        }

    </script>
</body>
</html>
